<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicGPT Lyrics Schablone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --surface3: #22222e;
  --border: #2a2a3a;
  --border-active: #6c5ce7;
  --text: #e8e6f0;
  --text-dim: #9895a8;
  --accent: #6c5ce7;
  --accent-glow: rgba(108,92,231,.25);
  --red: #ff6b6b;
  --green: #51cf66;
  --yellow: #ffd43b;
  --cyan: #22d3ee;
  --orange: #ff922b;
  --pink: #f06595;
  --section-intro: #22d3ee;
  --section-verse: #6c5ce7;
  --section-chorus: #ff922b;
  --section-bridge: #f06595;
  --section-outro: #51cf66;
  --section-solo: #f1c40f;
  --section-postchorus: #fd7e14;
  --section-prechorus: #a78bfa;
  --section-pre: #e599f7;
  --section-finalhook: #ff6b6b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(108,92,231,.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(255,107,107,.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}
.app {
  position: relative;
  z-index: 1;
  max-width: 1600px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}
.header {
  text-align: center;
  margin-bottom: 28px;
  padding: 36px 20px 24px;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
  position: relative;
}
.header::before {
  content: '';
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 60%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--cyan), transparent);
}
.header h1 {
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--accent) 20%, var(--cyan) 80%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 5px;
  filter: drop-shadow(0 0 20px rgba(108,92,231,.3));
}
.header .sub {
  font-size: .82rem;
  color: var(--text-dim);
  font-weight: 400;
  letter-spacing: .5px;
}
.header .autosave-indicator {
  font-size: .65rem;
  color: var(--green);
  margin-top: 5px;
  opacity: 0;
  transition: opacity .3s;
}
.header .autosave-indicator.visible { opacity: .8; }

/* Panel */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px 20px;
  margin-bottom: 16px;
  transition: border-color .2s;
}
.panel:hover { border-color: color-mix(in srgb, var(--border) 80%, var(--text-dim)); }
.panel > label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: .78rem;
  font-weight: 600;
  text-transform: none;
  letter-spacing: .3px;
  margin-bottom: 12px;
  cursor: pointer;
  user-select: none;
  padding: 2px 0 6px;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
}
.panel > label .panel-toggle {
  font-size: .8rem;
  color: var(--text-dim);
  transition: transform .2s;
}
.panel.collapsed > label { margin-bottom: 0; border-bottom-color: transparent; }
.panel.collapsed > label .panel-toggle { transform: rotate(-90deg); }
.panel.collapsed .panel-body { display: none; }
.panel textarea {
  width: 100%;
  min-height: 80px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: .82rem;
  padding: 12px;
  resize: vertical;
  outline: none;
  line-height: 1.6;
}
.panel textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* Save/Load bar */
.save-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  margin-bottom: 6px;
}
.save-bar input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: .82rem;
  padding: 6px 10px;
  outline: none;
  flex: 1;
  min-width: 150px;
}
.save-bar input:focus { border-color: var(--accent); }
.save-btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: color .15s, background .15s, border-color .15s;
}
.save-btn:hover { border-color: var(--accent); color: var(--cyan); }
.save-btn-green { border-color: var(--green); color: var(--green); }
.save-btn-green:hover { background: rgba(81,207,102,.1); }
.save-btn-orange { border-color: var(--orange); color: var(--orange); }
.save-btn-orange:hover { background: rgba(255,146,43,.1); }
.save-btn-red { border-color: var(--red); color: var(--red); }
.save-btn-red:hover { background: rgba(255,107,107,.1); }

/* Artists Table */
.artist-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 10px;
}
.artist-table th {
  font-size: .62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 5px 8px;
  text-align: left;
  border-bottom: 2px solid var(--border);
}
.artist-table td { padding: 3px 5px; }
.artist-table input, .artist-table select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-size: .8rem;
  padding: 4px 7px;
  outline: none;
  width: 100%;
}
.artist-table input:focus, .artist-table select:focus { border-color: var(--accent); }
.del-artist-btn {
  background: none;
  border: 1px solid var(--red);
  color: var(--red);
  border-radius: 5px;
  cursor: pointer;
  padding: 3px 7px;
  font-size: .72rem;
  opacity: .6;
}
.del-artist-btn:hover { opacity: 1; background: rgba(255,107,107,.1); }
.add-artist-btn {
  padding: 4px 12px;
  border-radius: 6px;
  border: 1px dashed var(--green);
  background: transparent;
  color: var(--green);
  font-size: .72rem;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Outfit';
}

/* Schema */
.schema-row {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  align-items: center;
  margin-bottom: 10px;
}
.schema-item {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.schema-pill {
  display: inline-flex;
  padding: 7px 14px;
  border-radius: 18px;
  font-size: .8rem;
  font-weight: 700;
  user-select: none;
  border: 2px solid;
  cursor: grab;
}
.schema-pill.dragging { opacity: .5; }
.schema-pill.drag-over { box-shadow: 0 0 10px var(--accent); }
.schema-controls {
  display: flex;
  gap: 3px;
}
.schema-controls button {
  width: 24px;
  height: 24px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  font-size: .72rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.schema-controls button:hover { border-color: var(--accent); color: var(--text); }
.schema-controls .remove-btn { color: var(--red); opacity: .6; }
.schema-controls .remove-btn:hover { opacity: 1; border-color: var(--red); }
.schema-arrow {
  color: var(--text-dim);
  font-size: 1rem;
  align-self: center;
}
.add-section-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 7px;
}
.add-section-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px dashed;
  background: transparent;
  font-size: .72rem;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Outfit';
  transition: all .15s ease;
  opacity: .75;
}
.add-section-btn:hover {
  opacity: 1;
  background: color-mix(in srgb, currentColor 10%, transparent);
  border-style: solid;
  transform: translateY(-1px);
}

/* Symbols */
.symbol-hint {
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
  color: var(--text-dim);
  font-size: .68rem;
}
.symbol-groups {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.kw-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  padding: 0;
  margin-bottom: 0;
  background: var(--bg);
  border-radius: 4px 4px 0 0;
  overflow: hidden;
  border: 1px solid var(--border);
  border-bottom: none;
}
.kw-tab {
  padding: 7px 14px;
  border: none;
  border-right: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
  border-radius: 0;
  background: transparent;
  color: var(--text-dim);
  font-family: 'Outfit', sans-serif;
  font-size: .6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  cursor: pointer;
  transition: color .12s, background .12s;
  position: relative;
}
.kw-tab:last-child { border-right: none; }
.kw-tab:hover {
  color: var(--text);
  background: color-mix(in srgb, var(--accent) 6%, transparent);
}
.kw-tab.active {
  color: var(--orange);
  background: var(--surface2);
  box-shadow: inset 0 -2px 0 var(--orange);
}
.kw-tab-content {
  display: none;
  padding: 10px 0 4px;
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 4px 4px;
  background: color-mix(in srgb, var(--surface2) 30%, transparent);
  padding: 10px;
}
.kw-tab-content.active { display: block; }
.kw-tab-header {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 8px;
}
.kw-tab-header button {
  font-size: .58rem;
  padding: 3px 10px;
  border-radius: 3px;
  border: 1px dashed color-mix(in srgb, var(--yellow) 60%, transparent);
  background: transparent;
  color: var(--yellow);
  cursor: pointer;
  font-family: 'Outfit';
  font-weight: 600;
  letter-spacing: .5px;
  text-transform: uppercase;
  transition: background .12s, border-color .12s;
}
.kw-tab-header button:hover {
  background: rgba(255,212,59,.08);
  border-color: var(--yellow);
}
.symbol-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.sym-btn {
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: .68rem;
  cursor: pointer;
  white-space: nowrap;
  position: relative;
  transition: border-color .1s, color .1s, background .1s, box-shadow .1s;
  line-height: 1.5;
}
.sym-btn:hover {
  border-color: var(--orange);
  color: var(--orange);
  background: rgba(255,146,43,.06);
  box-shadow: 0 0 6px rgba(255,146,43,.15);
}
.sym-btn:active { transform: scale(.96); }
.sym-btn .sym-delete {
  position: absolute;
  top: -5px;
  right: -5px;
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: var(--red);
  color: white;
  font-size: .5rem;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  line-height: 1;
  box-shadow: 0 1px 4px rgba(0,0,0,.4);
}
.sym-btn:hover .sym-delete { display: flex; }

/* ═══ SECTIONS: DAW Channel-Strip Editor ═══ */
.sections-container {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

/* ── Section Card ── */
.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  transition: border-color .25s ease, box-shadow .25s ease;
}
.section-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--sec-color, var(--accent));
  z-index: 2;
  transition: width .2s ease;
}
.section-card:hover::before { width: 4px; }
.section-card:hover {
  border-color: color-mix(in srgb, var(--sec-color, var(--accent)) 35%, var(--border));
  box-shadow: 0 2px 12px color-mix(in srgb, var(--sec-color, var(--accent)) 6%, transparent);
}

/* ── Section Header ── */
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 10px 5px 14px;
  cursor: pointer;
  user-select: none;
  background: linear-gradient(90deg, color-mix(in srgb, var(--sec-color, var(--accent)) 6%, var(--surface)), var(--surface) 60%);
  transition: background .2s ease;
  border-bottom: 1px solid color-mix(in srgb, var(--sec-color, var(--accent)) 8%, var(--border));
}
.section-header:hover {
  background: linear-gradient(90deg, color-mix(in srgb, var(--sec-color, var(--accent)) 12%, var(--surface)), var(--surface) 60%);
}
.section-badge {
  font-size: .58rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  padding: 2px 8px 2px 7px;
  border-radius: 3px;
  background: var(--sec-color, var(--accent));
  color: var(--bg);
  white-space: nowrap;
  border: none;
  text-shadow: 0 1px 1px rgba(0,0,0,.25);
  box-shadow: 0 0 8px color-mix(in srgb, var(--sec-color, var(--accent)) 20%, transparent);
  line-height: 1.4;
}
.section-info {
  display: flex;
  align-items: center;
  gap: 10px;
}
.line-count {
  font-size: .6rem;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  opacity: .6;
  padding: 2px 8px;
  background: color-mix(in srgb, var(--bg) 50%, transparent);
  border-radius: 2px;
}
.schema-flow {
  font-size: .5rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim);
  opacity: .35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  text-align: right;
  margin-left: auto;
  padding-right: 4px;
}
.schema-flow b {
  font-weight: 700;
  opacity: 1;
  text-decoration: underline;
  text-underline-offset: 2px;
}
.toggle-icon {
  font-size: .55rem;
  color: var(--text-dim);
  transition: transform .25s cubic-bezier(.4,0,.2,1), opacity .15s;
  opacity: .3;
  flex-shrink: 0;
  margin-left: 2px;
}
.section-header:hover .toggle-icon { opacity: .6; }
.section-header.collapsed .toggle-icon { transform: rotate(-90deg); }

/* ── Section Body ── */
.section-body {
  padding: 6px 12px 10px 14px;
  border-top: none;
  background: linear-gradient(180deg, color-mix(in srgb, var(--sec-color, var(--accent)) 2%, var(--bg)) 0%, var(--bg) 50px);
}

/* ── Line Group (Clip) ── */
.line-group {
  display: flex;
  gap: 0;
  align-items: stretch;
  margin-bottom: 5px;
  background: color-mix(in srgb, var(--surface) 60%, var(--bg));
  border-radius: 4px;
  border: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
  overflow: hidden;
  transition: border-color .2s ease, box-shadow .2s ease;
}
.line-group:hover {
  border-color: color-mix(in srgb, var(--sec-color, var(--accent)) 25%, var(--border));
}
.line-group:focus-within {
  border-color: color-mix(in srgb, var(--sec-color, var(--accent)) 40%, var(--border));
  box-shadow: 0 0 0 1px color-mix(in srgb, var(--sec-color, var(--accent)) 8%, transparent),
              0 2px 8px color-mix(in srgb, var(--sec-color, var(--accent)) 5%, transparent);
}

/* ── Group Sidebar (channel strip) ── */
.group-sidebar {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 6px;
  padding: 8px 4px;
  min-width: 44px;
  background: var(--surface2);
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}
.group-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: .6rem;
  font-weight: 700;
  color: var(--sec-color, var(--text-dim));
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  background: color-mix(in srgb, var(--sec-color, var(--accent)) 12%, transparent);
  border: 1px solid color-mix(in srgb, var(--sec-color, var(--accent)) 20%, transparent);
}
.group-sidebar select {
  width: 38px;
  font-size: .5rem;
  padding: 2px 1px;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--text-dim);
  cursor: pointer;
  outline: none;
  text-align: center;
}
.group-sidebar select:focus { border-color: var(--sec-color, var(--accent)); }

/* ── Group Content ── */
.group-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* ── Lines Area ── */
.group-lines {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.line-row {
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
}
.line-row:last-child { border-bottom: none; }

/* Rhyme letter indicator */
.line-letter {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  min-width: 26px;
  font-family: 'JetBrains Mono', monospace;
  font-size: .6rem;
  font-weight: 700;
  color: var(--text-dim);
  opacity: .4;
  border-right: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
  user-select: none;
  background: color-mix(in srgb, var(--surface2) 50%, transparent);
}
.line-row:focus-within .line-letter {
  opacity: .8;
  color: var(--sec-color, var(--accent));
}

.line-row textarea {
  flex: 1;
  background: transparent;
  border: none;
  border-radius: 0;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: .8rem;
  padding: 6px 10px;
  resize: none;
  outline: none;
  min-height: 30px;
  line-height: 1.5;
  overflow: hidden;
}
.line-row textarea:focus {
  background: color-mix(in srgb, var(--sec-color, var(--accent)) 4%, transparent);
}
.line-row textarea::placeholder {
  color: var(--text-dim);
  opacity: .45;
  font-style: italic;
}

/* (old inline-symbols bar removed — per-line dropdown used now) */

/* ── Per-Line Meta Buttons ── */
.line-wrap {
  border-bottom: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
}
.line-wrap:last-child { border-bottom: none; }

.line-btns {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 0 4px;
  flex-shrink: 0;
}
.lm-btn {
  position: relative;
  display: flex;
  align-items: center;
  gap: 2px;
  height: 22px;
  padding: 0 6px;
  border: 1px solid color-mix(in srgb, var(--btn-c, var(--accent)) 30%, transparent);
  border-radius: 3px;
  background: color-mix(in srgb, var(--btn-c, var(--accent)) 8%, transparent);
  color: color-mix(in srgb, var(--btn-c, var(--accent)) 70%, var(--text));
  font-family: 'JetBrains Mono', monospace;
  font-size: .55rem;
  font-weight: 700;
  letter-spacing: .3px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .12s ease;
  outline: none;
  user-select: none;
}
.lm-btn:hover {
  background: color-mix(in srgb, var(--btn-c, var(--accent)) 18%, transparent);
  border-color: color-mix(in srgb, var(--btn-c, var(--accent)) 50%, transparent);
  color: var(--btn-c, var(--accent));
  box-shadow: 0 0 8px color-mix(in srgb, var(--btn-c, var(--accent)) 20%, transparent);
}
.lm-btn.active {
  background: color-mix(in srgb, var(--btn-c, var(--accent)) 22%, transparent);
  border-color: var(--btn-c, var(--accent));
  color: var(--btn-c, var(--accent));
  box-shadow: 0 0 6px color-mix(in srgb, var(--btn-c, var(--accent)) 25%, transparent),
              inset 0 0 8px color-mix(in srgb, var(--btn-c, var(--accent)) 8%, transparent);
}
.lm-btn .lm-tag {
  font-size: .5rem;
  opacity: .7;
}
.lm-btn .lm-val {
  max-width: 72px;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 600;
  font-size: .55rem;
}

<body>
<div class="app">
<div class="header">
  <h1>MusicGPT Lyrics Schablone</h1>
  <div class="sub">Lyrics strukturiert aufbauen &amp; als Prompt exportieren</div>
  <div class="autosave-indicator" id="autosaveIndicator">Auto-gespeichert</div>
</div>

<!-- Save/Load Templates -->
<div class="panel" id="pSave">

      <button class="save-btn save-btn-orange" onclick="document.getElementById('loadFile').click()">Laden (.json)</button>
      <button class="save-btn save-btn-red" onclick="clearAutoSave()">Auto-Save loeschen</button>

  </div>
</div>

<!-- Style Prompt -->
<div class="panel" id="pStyle">

  <div class="panel-body">
    <textarea id="promptField" oninput="onPromptInput()">A modern hip hop rap,
sharp hi-hats, punchy kick, Trap, UK Drill, dark but clean production,
Heavy bass, punchy drums, aggressive synth leads. 2010-2020 Diss
deutsch. leading Male rapper, Female Rapper, Female Singer, female
vocals, female support. add lips, vocals, wispern, trap, background,
Chor, aggressiv, doppelreime, Bass, hart, dubstep, double-time-rhyme</textarea>
    <div class="template-bar">
      <label>Song Template</label>

<script>
// ── Panel Toggle ──
function toggleP(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

// ── Globals ──
let lastTA = null;
let lastInput = null;
document.addEventListener('focusin', e => {
  if (e.target.tagName === 'TEXTAREA' && e.target.closest('.line-row')) { lastTA = e.target; lastInput = null; }
  if (e.target.tagName === 'INPUT' && e.target.closest('.meta-field')) { lastInput = e.target; lastTA = null; }
});

let artists = [
  { name: 'A', gender: 'Male', role: 'Lead', voice: 'Tenor' },
  { name: 'B', gender: 'Female', role: 'Lead', voice: 'Alto' },
  { name: 'C', gender: 'Female', role: 'Support', voice: 'Soprano' },
  { name: 'D', gender: 'Male', role: 'Support', voice: 'Bass' }
];
const VOICE_RANGES = ['Soprano','Mezzo-Soprano','Alt','Alto','Tenor','Bariton','Bass'];
const STYPES = {
  Intro:          { color: 'var(--section-intro)',      lines: 4, tag: '[Intro]' },
  Verse:          { color: 'var(--section-verse)',      lines: 8, tag: '[Verse]' },
  Pre:            { color: 'var(--section-pre)',        lines: 2, tag: '[Pre]' },
  'Pre-Chorus':   { color: 'var(--section-prechorus)',  lines: 4, tag: '[Pre-Chorus]' },
  Chorus:         { color: 'var(--section-chorus)',     lines: 6, tag: '[Chorus]' },
  'Post-Chorus':  { color: 'var(--section-postchorus)', lines: 4, tag: '[Post-Chorus]' },
  Bridge:         { color: 'var(--section-bridge)',     lines: 6, tag: '[Bridge]' },
  Solo:           { color: 'var(--section-solo)',       lines: 2, tag: '[Solo]' },
  'Final Hook':   { color: 'var(--section-finalhook)',  lines: 4, tag: '[Final Hook]' },
  Outro:          { color: 'var(--section-outro)',      lines: 4, tag: '[Outro]' }
};
const TYPES = ['Rap','Sing','Spoken','Melodic Rap','Scream','Chant','Hum','Beatbox','Call & Response','Duett','Chor','Ad-lib','Freestyle'];

const REIMSCHEMAS = [
  { key: 'single',  label: 'Einzelzeile',          pattern: 'a',      lines: 1 },
  { key: 'paar',    label: 'Paarreim (AABB)',       pattern: 'aabb',   lines: 4 },
  { key: 'kreuz',   label: 'Kreuzreim (ABAB)',      pattern: 'abab',   lines: 4 },
  { key: 'umarm',   label: 'Umarmend (ABBA)',       pattern: 'abba',   lines: 4 },
  { key: 'haufen3', label: 'Haufenreim (AAA)',      pattern: 'aaa',    lines: 3 },
  { key: 'haufen4', label: 'Haufenreim (AAAA)',     pattern: 'aaaa',   lines: 4 },

// ── Undo System ──
let undoStack = [];
let undoTimer = null;

function pushUndo(label, restoreFn) {
  undoStack = [{ label, restore: restoreFn }];
  const bar = document.getElementById('undoBar');
  bar.textContent = `Rueckgaengig: ${label}`;
  bar.classList.add('visible');
  clearTimeout(undoTimer);
  undoTimer = setTimeout(() => { bar.classList.remove('visible'); undoStack = []; }, 8000);
}

function performUndo() {
  if (!undoStack.length) return;
  const action = undoStack.pop();
  action.restore();
  document.getElementById('undoBar').classList.remove('visible');
  clearTimeout(undoTimer);
  showToast('Rueckgaengig gemacht!');
}

// ── Auto-Save (localStorage) ──
let autoSaveTimer = null;

function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    try {
      localStorage.setItem('musicgpt_autosave', JSON.stringify(getState()));
      const ind = document.getElementById('autosaveIndicator');
      ind.classList.add('visible');
      setTimeout(() => ind.classList.remove('visible'), 2000);
    } catch(e) { /* storage full or unavailable */ }
  }, 1500);
}

function loadAutoSave() {
  try {
    const data = localStorage.getItem('musicgpt_autosave');
    if (data) {
      const state = JSON.parse(data);
      applyState(state);
      showToast('Auto-Save geladen!');
      return true;
    }
  } catch(e) { /* ignore */ }
  return false;
}

function clearAutoSave() {
  localStorage.removeItem('musicgpt_autosave');
  showToast('Auto-Save geloescht');
}

    };

      x.className = 'sym-delete';
      x.textContent = '\u2715';

        e.stopPropagation();

// ── Schema ──
function renderSchema() {
  const row = document.getElementById('schemaRow');
  row.innerHTML = '';
  schema.forEach((s, i) => {
    const cfg = STYPES[s] || STYPES.Verse;
    const item = document.createElement('div');
    item.className = 'schema-item';

    const pill = document.createElement('div');
    pill.className = 'schema-pill';
    pill.style.borderColor = cfg.color;
    pill.style.color = cfg.color;
    pill.textContent = s;
    pill.draggable = true;
    pill.dataset.index = i;
    pill.ondragstart = (e) => { e.dataTransfer.setData('text/plain', i); pill.classList.add('dragging'); };
    pill.ondragend = () => pill.classList.remove('dragging');
    pill.ondragover = (e) => { e.preventDefault(); pill.classList.add('drag-over'); };
    pill.ondragleave = () => pill.classList.remove('drag-over');
    pill.ondrop = (e) => {
      e.preventDefault();
      pill.classList.remove('drag-over');
      const from = parseInt(e.dataTransfer.getData('text/plain'));
      const to = i;
      if (from !== to) {
        const moved = schema.splice(from, 1)[0];
        schema.splice(to, 0, moved);
        renderSchema();
        rebuildSec();
        scheduleAutoSave();
      }
    };
    item.appendChild(pill);

    const c = document.createElement('div');
    c.className = 'schema-controls';
    if (i > 0) {
      const b = document.createElement('button');
      b.textContent = '\u25c0';
      b.onclick = () => mvS(i, -1);
      c.appendChild(b);
    }
    const d = document.createElement('button');
    d.className = 'remove-btn';
    d.textContent = '\u2715';
    d.onclick = () => {
      confirmAction('Sektion entfernen', `"${s}" aus dem Schema entfernen?`, () => {
        const removed = schema.splice(i, 1)[0];
        pushUndo('Sektion "' + removed + '"', () => { schema.splice(i, 0, removed); renderSchema(); rebuildSec(); });
        renderSchema();
        rebuildSec();
        scheduleAutoSave();
      });
    };
    c.appendChild(d);
    if (i < schema.length - 1) {
      const b = document.createElement('button');
      b.textContent = '\u25b6';
      b.onclick = () => mvS(i, 1);
      c.appendChild(b);
    }
    item.appendChild(c);
    row.appendChild(item);
    if (i < schema.length - 1) {
      const a = document.createElement('span');
      a.className = 'schema-arrow';
      a.textContent = '\u2192';
      row.appendChild(a);
    }
  });
}

function mvS(i, d) {
  const t = i + d;
  if (t < 0 || t >= schema.length) return;
  const x = schema.splice(i, 1)[0];
  schema.splice(t, 0, x);
  renderSchema();
  rebuildSec();
  scheduleAutoSave();
}

// ── Sections ──
function mkLine() {
  return { text: '', artist: '', artist2: '', type: 'Rap', vocalCues: '', performance: '' };
}
function mkG(rs) {
  const n = rsLines(rs);
  return { lines: Array.from({ length: n }, () => mkLine()), rs: rs };
}
// Migrate old string-based lines to objects
function migrateLine(l) {
  if (typeof l === 'string') return { text: l, artist: '', artist2: '', type: 'Rap', vocalCues: '', performance: '' };
  return { text: l.text || '', artist: l.artist || '', artist2: l.artist2 || '', type: l.type || 'Rap', vocalCues: l.vocalCues || '', performance: l.performance || '' };
}
function migrateGroup(g) {
  // Migrate old group-level meta to per-line if lines are strings
  if (g.lines && g.lines.length && typeof g.lines[0] === 'string') {
    g.lines = g.lines.map(l => ({
      text: l, artist: g.artist || '', artist2: g.artist2 || '',
      type: g.type || 'Rap', vocalCues: g.vocalCues || '', performance: g.performance || ''
    }));
  } else if (g.lines) {
    g.lines = g.lines.map(migrateLine);
  }
  return g;
}

function rebuildSec() {
  const saved = {};
  sections.forEach(s => { saved[s.id] = { groups: s.groups, defRS: s.defRS }; });
  sections = [];
  const tc = {};
  schema.forEach(type => {
    tc[type] = (tc[type] || 0) + 1;
    const num = tc[type];
    const id = `${type}_${num}`;
    const cfg = STYPES[type] || STYPES.Verse;
    const ex = saved[id];
    const defRS = ex ? ex.defRS : 'paar2';
    const gc = Math.max(1, Math.round(cfg.lines / rsLines(defRS)));
    sections.push({
      id, type, num,
      color: cfg.color,
      tag: cfg.tag.replace(']', num > 1 ? ` ${num}]` : ']'),
      defRS,
      groups: ex ? ex.groups : Array.from({ length: gc }, () => mkG(defRS)),
      collapsed: false
    });
  });
  renderSec();
}

          btns.appendChild(mkMetaBtn('P', 'var(--orange)', lineObj.performance, perfOptsFn,

          symBtn.className = 'line-sym-btn';
          symBtn.textContent = '\u2795';
          symBtn.onclick = ((textarea) => e => {
            e.stopPropagation();

          })(ta);

          lineWrap.appendChild(row);
          lines.appendChild(lineWrap);
        });
        gc.appendChild(lines);
        ge.appendChild(gc);
        body.appendChild(ge);
      });

      // ── Section Controls Bar ──
      const ctrl = document.createElement('div');
      ctrl.className = 'section-controls';

      const addGBtn = document.createElement('button');
      addGBtn.textContent = '+ Gruppe';
      addGBtn.onclick = () => addG(si);
      ctrl.appendChild(addGBtn);

      const rmGBtn = document.createElement('button');
      rmGBtn.textContent = '\u2212 Gruppe';
      rmGBtn.onclick = () => rmG(si);
      ctrl.appendChild(rmGBtn);

      const dupBtn = document.createElement('button');
      dupBtn.textContent = 'Duplizieren';
      dupBtn.className = 'dup-btn';
      dupBtn.title = 'Sektion mit Inhalt duplizieren';
      dupBtn.onclick = () => dupSection(si);
      ctrl.appendChild(dupBtn);

      const lbl = document.createElement('span');
      lbl.className = 'label-small';
      lbl.textContent = 'Neue Gr.:';

      const defSel = document.createElement('select');
      defSel.title = 'Standard-Reimschema fuer neue Gruppen';
      REIMSCHEMAS.forEach(rs => {
        const o = document.createElement('option');
        o.value = rs.key;
        o.textContent = rs.label;
        if (rs.key === sec.defRS) o.selected = true;
        defSel.appendChild(o);
      });
      defSel.onchange = ((idx) => e => { sections[idx].defRS = e.target.value; scheduleAutoSave(); })(si);
      ctrl.appendChild(lbl);
      ctrl.appendChild(defSel);
      body.appendChild(ctrl);
      div.appendChild(body);
    }
    c.appendChild(div);
  });
}

function autoResizeTA(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function addG(si) {
  sections[si].groups.push(mkG(sections[si].defRS));
  renderSec();
  scheduleAutoSave();
}

function rmG(si) {
  if (sections[si].groups.length > 1) {
    const hasContent = sections[si].groups[sections[si].groups.length - 1].lines.some(l => (l.text || '').trim());
    const doRemove = () => {
      const removed = sections[si].groups.pop();
      pushUndo('Gruppe in ' + sections[si].tag, () => { sections[si].groups.push(removed); renderSec(); });
      renderSec();
      scheduleAutoSave();
    };
    if (hasContent) {
      confirmAction('Gruppe loeschen', `Letzte Gruppe in ${sections[si].tag} enthaelt Text. Wirklich loeschen?`, doRemove);
    } else {
      doRemove();
    }
  }
}

function dupSection(si) {
  const src = sections[si];
  const srcData = JSON.parse(JSON.stringify(src.groups));
  const srcRS = src.defRS;
  // Find the schema position for this section (count occurrences of its type up to si)
  let count = 0;
  let schemaPos = -1;
  for (let i = 0; i < schema.length; i++) {
    if (schema[i] === src.type) {
      if (count === si - sections.slice(0, si).filter(s => s.type !== src.type).length) {
        schemaPos = i;
        break;
      }
      count++;
    }
  }
  if (schemaPos === -1) schemaPos = schema.lastIndexOf(src.type);
  schema.splice(schemaPos + 1, 0, src.type);
  renderSchema();
  rebuildSec();
  // Find the new section: it's the (count+1)th occurrence of this type
  let occ = 0;
  for (let i = 0; i < sections.length; i++) {
    if (sections[i].type === src.type) {
      if (occ === count + 1) {
        sections[i].groups = srcData;
        sections[i].defRS = srcRS;
        break;
      }
      occ++;
    }
  }
  renderSec();
  scheduleAutoSave();
  showToast('Sektion dupliziert!');
}

// ── Save / Load JSON ──
function getState() {
  return {
    name: document.getElementById('tmplName').value,
    date: new Date().toISOString(),
    prompt: document.getElementById('promptField').value,
    artists,
    schema,
    sections: sections.map(s => ({
      id: s.id, type: s.type, num: s.num, defRS: s.defRS,
      groups: s.groups, collapsed: s.collapsed
    })),
    promptKW
  };
}

function applyState(state) {
  if (state.prompt !== undefined) document.getElementById('promptField').value = state.prompt;
  if (state.name) document.getElementById('tmplName').value = state.name;
  if (state.artists) artists = state.artists;
  if (state.schema) schema = state.schema;
  if (state.promptKW) promptKW = state.promptKW;
  if (state.sections) {
    sections = state.sections.map(s => {
      const cfg = STYPES[s.type] || STYPES.Verse;
      // Migrate groups: convert old string-based lines to per-line objects
      if (s.groups) s.groups = s.groups.map(migrateGroup);
      return { ...s, color: cfg.color, tag: cfg.tag.replace(']', s.num > 1 ? ` ${s.num}]` : ']') };
    });
  }
  renderArtists();
  renderSchema();
  renderSec();
  renderPromptKW();
  highlightActiveKW();
}

function saveJSON() {
  const state = getState();
  const name = state.name || 'MusicGPT_Template';
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${name.replace(/\s+/g, '_')}_${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 500);
  showToast('Gespeichert!');
}

function loadJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const state = JSON.parse(ev.target.result);
      applyState(state);
      showToast('Template geladen!');
    } catch (err) {
      alert('Fehler beim Laden: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Export ──
function genOut() {
  const prompt = document.getElementById('promptField').value.trim();
  // ── MusicGPT-optimized plain text output ──
  // Format: style prompt on top, then [Section] tags with lyrics only
  // No metadata (Artists/Schema) — MusicGPT reads style from prompt field
  let plainOut = '';
  let htmlOut = '';

  // Style/Production prompt block
  if (prompt) {
    plainOut += prompt + '\n\n';
    htmlOut += `<div class="out-prompt-block">${esc(prompt)}</div>`;
  }

  // Artist Blend block (both plain & HTML) — follows MusicGPT multi-artist convention
  if (artists.length) {
    plainOut += 'Artist Blend:\n';
    let artHtml = '<div class="out-artists-block">Artist Blend:';
    artists.forEach(a => {
      const parts = [];
      if (a.role) parts.push(a.role);
      let gv = a.gender || '';
      if (a.voice) gv = gv ? gv + '/' + a.voice : a.voice;
      if (gv) parts.push(gv);
      const meta = parts.length ? ' (' + parts.join(', ') + ')' : '';
      plainOut += '- ' + a.name + meta + '\n';
      artHtml += `<div class="out-artist-line">- ${esc(a.name)}${meta ? '<span class="out-annotation">' + esc(meta) + '</span>' : ''}</div>`;
    });
    plainOut += '\n';
    htmlOut += artHtml + '</div>';
  }
  // Structure line — uses hyphens (MusicGPT-preferred over arrows)
  plainOut += 'Structure: ' + schema.join(' - ') + '\n\n';
  htmlOut += `<div class="out-schema-line">Structure: ${schema.map(s => esc(s)).join(' - ')}</div><hr class="out-separator">`;

  let totalWords = 0;
  let totalLines = 0;
  const outputCache = {};
  sections.forEach(sec => {
    const typeKey = sec.type.toLowerCase();
    const filled = sec.groups.filter(g => g.lines.some(l => (l.text || '').trim()));
    let secPlain = '';
    let secHtml = '';
    if (!filled.length) {
      secPlain = '(instrumental)\n';
      secHtml = '<span class="out-annotation">(instrumental)</span>\n';
    } else {
      // Determine section-level uniform artist / type — if consistent, fold into section tag
      const allLines = sec.groups.flatMap(g => g.lines).filter(l => (l.text||'').trim());
      const uniqueArtists = [...new Set(allLines.map(l => l.artist).filter(Boolean))];
      const uniqueTypes = [...new Set(allLines.map(l => l.type || 'Rap'))];
      const sectionArtist = uniqueArtists.length === 1 && uniqueArtists[0] ? uniqueArtists[0] : null;
      const sectionType = (uniqueTypes.length === 1 && uniqueTypes[0] !== 'Rap') ? uniqueTypes[0] : null;
      // Build per-section tag annotation: [Verse - A, Sing style]
      const tagAnno = [];
      if (sectionArtist) tagAnno.push(sectionArtist);
      if (sectionType) tagAnno.push(sectionType + ' style');
      if (tagAnno.length) {
        sec._computedTag = sec.tag.replace(/\]$/, ' - ' + tagAnno.join(', ') + ']');
      } else {
        sec._computedTag = sec.tag;
      }
      sec.groups.forEach((g, gi) => {
        if (!g.lines.some(l => (l.text || '').trim())) return;
        g.lines.forEach(l => {
          const txt = (l.text || '').trim();
          if (!txt) return;
          // Per-line annotations use MusicGPT-friendly (...) syntax only.
          // Skip artist/type if they match the section-level uniform value.
          const parts = [];
          const htmlParts = [];
          if (l.artist && l.artist !== sectionArtist) {
            parts.push(l.artist);
            htmlParts.push('<span class="out-anno-artist">' + esc(l.artist) + '</span>');
          }
          const lineType = l.type || 'Rap';
          if (!sectionType && lineType !== 'Rap') {
            parts.push(lineType);
            htmlParts.push('<span class="out-anno-type">' + esc(lineType) + '</span>');
          }
          if (l.vocalCues) {
            parts.push(l.vocalCues);
            htmlParts.push('<span class="out-anno-vcue">' + esc(l.vocalCues) + '</span>');
          }
          if (l.performance) {
            parts.push(l.performance);
            htmlParts.push('<span class="out-anno-perf">' + esc(l.performance) + '</span>');
          }
          const pfx = parts.length ? '(' + parts.join(', ') + ') ' : '';
          const pfxHtml = htmlParts.length ? '<span class="out-annotation">(</span>' + htmlParts.join('<span class="out-annotation">, </span>') + '<span class="out-annotation">)</span> ' : '';
          secPlain += pfx + txt + '\n';
          secHtml += `<div class="out-lyric-line">${pfxHtml}${esc(txt)}</div>`;
        });
        if (gi < sec.groups.length - 1 && filled.length > 1) {
          secPlain += '\n';
          secHtml += '<div style="height:6px"></div>';
        }
      });
    }
    if (!outputCache[typeKey]) outputCache[typeKey] = [];
    if (outputCache[typeKey].includes(secPlain)) return;
    outputCache[typeKey].push(secPlain);
    sec.groups.forEach(g => {
      g.lines.forEach(l => {
        const txt = (l.text || '').trim();
        if (txt) { totalLines++; totalWords += txt.split(/\s+/).length; }
      });
    });
    const cfg = STYPES[sec.type] || STYPES.Verse;
    // MusicGPT format: [Section - annotations] tag on its own line
    const outTag = sec._computedTag || sec.tag;
    plainOut += outTag + '\n' + secPlain + '\n';
    htmlOut += `<div><span class="out-section-tag" style="color:${cfg.color};background:color-mix(in srgb, ${cfg.color} 12%, transparent);border:1px solid color-mix(in srgb, ${cfg.color} 25%, transparent)">${esc(outTag)}</span></div>${secHtml}<hr class="out-separator">`;
  });
  const outBox = document.getElementById('outBox');
  outBox.innerHTML = htmlOut;
  outBox.dataset.plain = plainOut.trim();
  document.getElementById('statWords').textContent = 'Woerter: ' + totalWords;
  document.getElementById('statLines').textContent = 'Zeilen: ' + totalLines;
  document.getElementById('statSections').textContent = 'Sektionen: ' + sections.length;
}

function copyOut() {
  const outBox = document.getElementById('outBox');
  if (!outBox.innerHTML.trim()) { genOut(); }
  const text = outBox.dataset.plain || outBox.textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('Kopiert!')).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast('Kopiert!');
}

function showToast(msg) {

// ── Keyboard Shortcuts ──
document.addEventListener('keydown', e => {
  // Ctrl+S: Save JSON
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    saveJSON();
  }
  // Ctrl+G: Generate output
  if (e.ctrlKey && e.key === 'g') {
    e.preventDefault();
    genOut();
  }
  // Ctrl+Shift+C: Copy output (only when not in a text field)
  if (e.ctrlKey && e.shiftKey && e.key === 'C') {
    e.preventDefault();
    copyOut();
  }
  // Ctrl+Z: Undo (only for our undo stack, not browser undo)
  if (e.ctrlKey && e.key === 'z' && !e.target.matches('textarea, input')) {
    e.preventDefault();
    performUndo();
  }
});

// ── Confirmation Modal ──
function confirmAction(title, message, onConfirm, confirmLabel = 'Loeschen') {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `<div class="confirm-box">
    <h3>${esc(title)}</h3>
    <p>${esc(message)}</p>
    <div class="confirm-actions">
      <button class="confirm-cancel">Abbrechen</button>
      <button class="confirm-delete">${esc(confirmLabel)}</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  const closeModal = () => { overlay.remove(); document.removeEventListener('keydown', escHandler); };
  overlay.querySelector('.confirm-cancel').onclick = closeModal;
  overlay.querySelector('.confirm-delete').onclick = () => { closeModal(); onConfirm(); };
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
  // ESC to close
  const escHandler = (e) => { if (e.key === 'Escape') closeModal(); };
  document.addEventListener('keydown', escHandler);
}

function renderTemplates() {
  const sel = document.getElementById('tmplSelect');
  sel.innerHTML = '<option value="">-- Template waehlen --</option>';
  SONG_TEMPLATES.forEach((tmpl, i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = `${tmpl.name} (${tmpl.genre})`;
    sel.appendChild(o);
  });
}

function applyTemplate(idx) {
  if (idx === '') return;
  const tmpl = SONG_TEMPLATES[parseInt(idx)];
  if (!tmpl) return;
  schema = [...tmpl.schema];
  if (tmpl.style) {
    document.getElementById('promptField').value = tmpl.style;
    highlightActiveKW();
  }
  renderSchema();
  rebuildSec();
  scheduleAutoSave();
  showToast('Template "' + tmpl.name + '" geladen!');
}

// ── Prompt input handler (auto-save + keyword highlighting) ──
function onPromptInput() {
  scheduleAutoSave();
  highlightActiveKW();
}

function highlightActiveKW() {
  const pf = document.getElementById('promptField');
  const text = pf.value.toLowerCase();
  document.querySelectorAll('#promptKwContainer .sym-btn').forEach(btn => {
    const kw = btn.textContent.replace('\u2715', '').trim().toLowerCase();
    if (text.includes(kw)) {
      btn.classList.add('kw-active');
    } else {
      btn.classList.remove('kw-active');
    }
  });
}

// ── Inline Symbols for Section Editors (Dropdown) ──
const INLINE_SYMBOL_GROUPS = [
  { group: 'Vocal', items: [
    { label: '(whisper)' }, { label: '(scream)' }, { label: '(spoken)' },
    { label: '(deep voice)' }, { label: '(autotune)' }, { label: '(raspy)' },
    { label: '(falsetto)' }, { label: '(breathy)' }, { label: '(belting)' },
    { label: '(growl)' }, { label: '(humming)' }
  ]},
  { group: 'Layer', items: [
    { label: '(ad-lib)' }, { label: '(choir)' }, { label: '(echoed)' },
    { label: '(harmonies)' }, { label: '(doubled)' }, { label: '(backing vocal)' }
  ]},
  { group: 'Flow', items: [
    { label: '(doubletime)' }, { label: '(half-time)' }, { label: '(aggressive)' },
    { label: '(melodic)' }, { label: '(pause)' }, { label: '(climax)' }
  ]},
  { group: 'Production', items: [
    { label: '(drop)' }, { label: '(build up)' }, { label: '(fade out)' },
    { label: '(instrumental)' }, { label: '(breakdown)' }, { label: '(a cappella)' }
  ]},
  { group: 'Zeichen', items: [
    { label: '\u2014', title: 'Rapper-Wechsel' },
    { label: '\u2026', title: 'Auslassung' },
    { label: '/', title: 'Atempause' },
    { label: '//', title: 'Laengere Pause' },
    { label: '~', title: 'Melodisch gedehnt' },
    { label: '\u00d72', title: 'Wiederholung \u00d72' },
    { label: '\u00d73', title: 'Wiederholung \u00d73' }
  ]}
];

// ── Shared Popover System (lazy, single DOM element) ──
const _sharedPop = document.createElement('div');
_sharedPop.className = 'lm-pop';
document.body.appendChild(_sharedPop);

function closePops() {
  _sharedPop.classList.remove('open');
  _sharedPop.innerHTML = '';
}

function openMetaPop(btn, color, currentVal, options, onSelect) {
  closePops();
  _sharedPop.style.setProperty('--btn-c', color);
  // Build items
  const clr = document.createElement('button');
  clr.className = 'lm-pop-item clear-opt';
  clr.textContent = '\u2014 none';
  clr.onclick = (e) => { e.stopPropagation(); onSelect(''); closePops(); };
  _sharedPop.appendChild(clr);
  options.forEach(opt => {
    const item = document.createElement('button');
    item.className = 'lm-pop-item' + (opt.value === currentVal ? ' sel' : '');
    item.textContent = opt.label;
    item.onclick = (e) => { e.stopPropagation(); onSelect(opt.value); closePops(); };
    _sharedPop.appendChild(item);
  });
  // Position
  const r = btn.getBoundingClientRect();
  _sharedPop.style.left = r.left + 'px';
  _sharedPop.style.top = (r.bottom + 4) + 'px';
  _sharedPop.classList.add('open');
  const pr = _sharedPop.getBoundingClientRect();
  if (pr.right > window.innerWidth - 8) {
    _sharedPop.style.left = Math.max(8, r.right - pr.width) + 'px';
  }
  if (pr.bottom > window.innerHeight - 8) {
    _sharedPop.style.top = (r.top - pr.height - 4) + 'px';
  }
}

function openSymPop(btn, ta) {
  closePops();
  _sharedPop.style.removeProperty('--btn-c');
  INLINE_SYMBOL_GROUPS.forEach(grpS => {
    const lbl = document.createElement('div');
    lbl.className = 'sym-pop-group';
    lbl.textContent = grpS.group;
    _sharedPop.appendChild(lbl);
    grpS.items.forEach(sym => {
      const item = document.createElement('button');
      item.className = 'sym-pop-item';
      item.textContent = sym.title ? `${sym.label}  (${sym.title})` : sym.label;
      item.onclick = (e) => { e.stopPropagation(); insertSymbolAtCursor(ta, sym.label); closePops(); };
      _sharedPop.appendChild(item);
    });
  });
  const r = btn.getBoundingClientRect();
  _sharedPop.style.left = r.left + 'px';
  _sharedPop.style.top = (r.bottom + 4) + 'px';
  _sharedPop.classList.add('open');
  const pr = _sharedPop.getBoundingClientRect();
  if (pr.right > window.innerWidth - 8) {
    _sharedPop.style.left = Math.max(8, r.right - pr.width) + 'px';
  }
  if (pr.bottom > window.innerHeight - 8) {
    _sharedPop.style.top = (r.top - pr.height - 4) + 'px';
  }
}

document.addEventListener('click', () => closePops());

function insertSymbolAtCursor(ta, label) {
  if (!ta) return;
  const s = ta.selectionStart ?? ta.value.length;
  const en = ta.selectionEnd ?? s;
  const before = ta.value.substring(0, s);
  const after = ta.value.substring(en);
  const sep = (before.length > 0 && !/[\s(\[]$/.test(before)) ? ' ' : '';
  const ins = sep + label + ' ';
  ta.value = before + ins + after;
  ta.selectionStart = ta.selectionEnd = s + ins.length;
  ta.focus();
  ta.dispatchEvent(new Event('input'));
}

// ── Init ──
if (!loadAutoSave()) {
  renderArtists();
  renderSchema();
  renderAddBtns();
  rebuildSec();
  renderPromptKW();
} else {
  renderAddBtns();
}
renderTemplates();
highlightActiveKW();
</script>
